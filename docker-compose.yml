services:
  mongodb:
    image: mongo:7.0
    container_name: bankmanager-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-appuser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-apppassword}
      MONGO_INITDB_DATABASE: bankmanager
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - ./data/mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - bankmanager-network

  mongo-express:
    image: mongo-express:1.0.2
    container_name: bankmanager-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-appuser}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-apppassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-appuser}:${MONGO_PASSWORD:-apppassword}@mongodb:27017/bankmanager?authSource=bankmanager
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER:-appuser}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASSWORD:-apppassword}
    ports:
      - '${MONGO_EXPRESS_PORT:-8081}:8081'
    networks:
      - bankmanager-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bankmanager-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env.development.local
    environment:
      MONGO_URI: mongodb://appuser:apppassword@mongodb:27017/bankmanager?authSource=bankmanager
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    networks:
      - bankmanager-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bankmanager-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:5173'
    networks:
      - bankmanager-network

volumes:
  mongo_data:
    driver: local

networks:
  bankmanager-network:
    driver: bridge
